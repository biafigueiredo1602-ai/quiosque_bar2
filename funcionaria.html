<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel Funcionária</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📋 Pedidos</h1>

<div id="listaPedidos"></div>

<button onclick="mostrarPedidos()">Atualizar</button>

<!-- ⚠️ SCRIPT NO FIM DO BODY -->
<script>
function mostrarPedidos() {
    let lista = document.getElementById("listaPedidos");
    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    lista.innerHTML = "";

    pedidos.forEach(pedido => {

        let div = document.createElement("div");

        let html = `<h3>Pedido #${pedido.numero}</h3>`;

        // 🚨 aqui estava o erro normalmente
        if (pedido.itens && pedido.itens.length > 0) {
            pedido.itens.forEach(item => {
                html += `<p>${item.nome} - ${item.preco.toFixed(2)}€</p>`;
            });
        } else {
            html += `<p><i>Sem itens</i></p>`;
        }

        html += `<strong>Total: ${pedido.total.toFixed(2)}€</strong>`;

        div.innerHTML = html;

        lista.appendChild(div);
    });
}

// carregar automaticamente
mostrarPedidos();
</script>

</body>
</html>
