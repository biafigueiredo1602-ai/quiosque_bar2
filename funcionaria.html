<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel Funcionária</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📋 Pedidos</h1>

<div id="listaPedidos"></div>

<button onclick="carregarPedidos()">Atualizar</button>

<!-- 🔥 SCRIPT NO FIM -->

<script>
function carregarPedidos() {
    let lista = document.getElementById("listaPedidos");
    lista.innerHTML = "";

    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    console.log(pedidos); // 👈 IMPORTANTE PARA VER

    if (pedidos.length === 0) {
        lista.innerHTML = "<p>Sem pedidos.</p>";
        return;
    }

    pedidos.forEach((pedido, index) => {

        let div = document.createElement("div");

        let html = `
            <h3>Pedido #${pedido.numero}</h3>
            <p>Total: ${pedido.total}€</p>
        `;

        // 🔥 VERIFICA SE EXISTEM ITENS
        if (pedido.itens && pedido.itens.length > 0) {
            pedido.itens.forEach(item => {
                html += `<p>• ${item.nome} (${item.preco}€)</p>`;
            });
        } else {
            html += `<p>⚠️ Sem itens</p>`;
        }

        html += `<button onclick="removerPedido(${index})">🗑️ Concluir</button><hr>`;

        div.innerHTML = html;
        lista.appendChild(div);
    });
}

function removerPedido(index) {
    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
    pedidos.splice(index, 1);
    localStorage.setItem("pedidos", JSON.stringify(pedidos));
    carregarPedidos();
}

carregarPedidos();
</script>
