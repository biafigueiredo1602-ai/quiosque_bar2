<script>
document.addEventListener("DOMContentLoaded", function () {

function carregarPedidos() {
    let lista = document.getElementById("listaPedidos");

    if (!lista) {
        console.log("ERRO: listaPedidos não encontrado");
        return;
    }

    lista.innerHTML = "";

    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    if (pedidos.length === 0) {
        lista.innerHTML = "<p>Sem pedidos no momento</p>";
        return;
    }

    pedidos.forEach((pedido, index) => {
        let div = document.createElement("div");

        let texto = `<h3>Pedido #${pedido.numero} - ${pedido.total.toFixed(2)}€</h3>`;

        pedido.itens.forEach(item => {
            texto += `<p>• ${item.nome} (${item.preco.toFixed(2)}€)</p>`;
        });

        texto += `<button onclick="removerPedido(${index})">🗑️ Concluir</button>`;

        div.innerHTML = texto;
        lista.appendChild(div);
    });
}

function removerPedido(index) {
    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    pedidos.splice(index, 1);

    localStorage.setItem("pedidos", JSON.stringify(pedidos));

    carregarPedidos();
}

carregarPedidos();

}); // 👈 FALTAVA ISTO
</script>
