<!DOCTYPE html> 

<html lang="pt"> 

<head> 

    <meta charset="UTF-8"> 

    <title>Painel Funcionária</title> 
    <link rel="stylesheet" href="style.css">
</head> 

<body> 

 

<h1>📋 Pedidos</h1>

<div id="listaPedidos"></div>

 

<button onclick="carregarPedidos()">Atualizar</button> 

 

<script> 

function carregarPedidos() { 
    let lista = document.getElementById("listaPedidos"); 
    lista.innerHTML = ""; 

    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || []; 

    if (pedidos.length === 0) { 
        lista.innerHTML = "<p>Sem pedidos.</p>"; 
        return; 
    } 

    pedidos.forEach((pedido, index) => { 
        let div = document.createElement("div"); 
        div.classList.add("pedido"); 

        let total = Number(pedido.total || 0); 

        let texto = `
            <h3>Pedido #${pedido.numero} - ${total.toFixed(2)}€</h3>
        `; 

        (pedido.itens || []).forEach(item => { 
            texto += `
                <p>• ${item.nome ?? "Sem nome"} (${Number(item.preco || 0).toFixed(2)}€)</p>
            `; 
        }); 

        texto += `
            <button onclick="removerPedido(${index})">🗑️ Concluir</button>
        `; 

        div.innerHTML = texto; 
        lista.appendChild(div); 
    }); 
}
</script>
</body>
</html>
